name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libxml2-dev libxmlsec1-dev libxmlsec1-openssl libclang-dev
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
